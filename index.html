<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Candidate Screening Form</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2f7, #dfe7f1);
      padding: 24px;
      color: #1f2937;
    }
    .container {
      max-width: 920px;
      margin: auto;
      background: rgba(255,255,255,0.96);
      padding: 38px;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.10);
      backdrop-filter: blur(8px);
    }
    h1 {
      text-align: center;
      margin-bottom: 28px;
      font-size: 30px;
      letter-spacing: 0.3px;
    }
    .section-title {
      margin: 30px 0 14px;
      font-size: 17px;
      font-weight: 700;
      color: #111827;
      border-left: 4px solid #111827;
      padding-left: 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .field {
      display: flex;
      flex-direction: column;
    }
    label {
      font-size: 13px;
      margin-bottom: 8px;
      font-weight: 700;
      color: #374151;
    }
    input, select, textarea {
      padding: 13px 14px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      font-size: 14px;
      width: 100%;
      background: #fafafa;
      transition: all 0.25s ease;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #111827;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(17,24,39,0.08);
    }
    textarea {
      min-height: 110px;
      resize: vertical;
    }
    .full-width {
      grid-column: 1 / -1;
    }
    button {
      margin-top: 34px;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #111827, #374151);
      color: #fff;
      box-shadow: 0 12px 24px rgba(17,24,39,0.18);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 28px rgba(17,24,39,0.22);
    }
    @media (max-width: 600px) {
      .container { padding: 22px; border-radius: 18px; }
      h1 { font-size: 24px; }
      .grid { gap: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Applicant Basic Information Form</h1>

    <form action="https://formspree.io/f/mpqkjkpn" method="POST">
      <div class="section-title">Personal Details</div>
      <div class="grid">
        <div class="field"><label>Full Name</label><input type="text" name="full_name" required></div>
        <div class="field"><label>Date of Birth</label><input type="date" name="date_of_birth"></div>
        <div class="field"><label>Gender</label><input type="text" name="gender"></div>
        <div class="field"><label>Nationality</label><input type="text" name="nationality"></div>
      </div>

      <div class="section-title">Education History</div>
      <div class="grid">
        <div class="field full-width"><label>Please provide details</label><textarea name="education_history"></textarea></div>
      </div>

      <div class="section-title">Immigration Status</div>
      <div class="grid">
        <div class="field"><label>Current Visa Type</label><input type="text" name="visa_type"></div>
        <div class="field"><label>Visa Expiry Date</label><input type="date" name="visa_expiry"></div>
        <div class="field"><label>Eligible for Sponsorship</label>
          <select name="eligible_sponsorship">
            <option value="">Select</option>
            <option>Yes</option>
            <option>No</option>
          </select>
        </div>
        <div class="field full-width"><label>Additional Immigration Information</label><textarea name="immigration_notes"></textarea></div>
      </div>

      <div class="section-title">Care Experience</div>
      <div class="grid">
        <div class="field"><label>Previous Care Experience</label><input type="text" name="care_experience"></div>
        <div class="field"><label>Years of Experience</label><input type="text" name="years_experience"></div>
        <div class="field"><label>Current Employer</label><input type="text" name="current_employer"></div>
      </div>

      <div class="section-title">Compliance</div>
      <div class="grid">
        <div class="field"><label>DBS Status</label><input type="text" name="dbs_status"></div>
        <div class="field"><label>Full UK Driving Licence</label>
          <select name="driving_licence"><option value="">Select</option><option>Yes</option><option>No</option></select>
        </div>
        <div class="field"><label>Own Vehicle</label>
          <select name="own_vehicle"><option value="">Select</option><option>Yes</option><option>No</option></select>
        </div>
      </div>

      <div class="section-title">Availability</div>
      <div class="grid">
        <div class="field"><label>Available for Flexible Shifts</label>
          <select name="flexible_shifts"><option value="">Select</option><option>Yes</option><option>No</option></select>
        </div>
        <div class="field"><label>Available Start Date</label><input type="date" name="start_date"></div>
      </div>

      <div class="section-title">Additional Notes</div>
      <div class="grid">
        <div class="field full-width"><label>Any other relevant information</label><textarea name="additional_notes"></textarea></div>
      </div>

      <button type="submit">Submit Applicant</button>
    </form>
  </div>
</body>
</html>
