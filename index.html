<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Applicant Information Form</title>
  <style>
    *{box-sizing:border-box;font-family:Arial,sans-serif}
    body{margin:0;background:#f4f6f8;padding:40px;color:#1f2937}
    .container{max-width:900px;margin:auto;background:#fff;border-radius:20px;box-shadow:0 12px 35px rgba(0,0,0,.08);overflow:hidden}
    .header{padding:28px 36px;background:#111827;color:#fff}
    .header h1{margin:0;font-size:28px}
    .header p{margin:8px 0 0;color:#d1d5db}
    form{padding:32px 36px}
    .section{margin-bottom:30px}
    .section h2{font-size:18px;border-bottom:2px solid #e5e7eb;padding-bottom:8px;margin-bottom:18px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}
    label{display:block;font-weight:600;margin-bottom:6px}
    input,select,textarea{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:12px;font-size:14px}
    textarea{min-height:100px;resize:vertical}
    .radio-group{display:flex;gap:18px;padding-top:10px}
    .submit-btn{width:100%;padding:16px;background:#111827;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:bold;cursor:pointer}
    .submit-btn:hover{opacity:.95}
      @media (max-width: 768px){
      body{padding:16px}
      .container{border-radius:16px}
      .header{padding:22px 20px}
      .header h1{font-size:22px;line-height:1.3}
      .header p{font-size:14px}
      form{padding:20px}
      .section{margin-bottom:22px}
      .section h2{font-size:16px}
      .grid{grid-template-columns:1fr;gap:14px}
      input,select,textarea{padding:11px;font-size:14px}
      .submit-btn{padding:14px;font-size:15px}
    }

    @media (max-width: 420px){
      .header h1{font-size:20px}
      form{padding:16px}
      .header{padding:18px 16px}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Applicant Basic Information Form</h1>
      <p>Candidate screening form for company review</p>
    </div>

    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <div class="section">
        <h2>Personal Details</h2>
        <div class="grid">
          <div><label>Full Name</label><input type="text" name="full_name"></div>
          <div><label>Date of Birth</label><input type="date" name="dob"></div>
          <div><label>Gender</label><input type="text" name="gender"></div>
          <div><label>Nationality</label><input type="text" name="nationality"></div>
        </div>
      </div>

      <div class="section">
        <h2>Education History</h2>
        <textarea name="education_history" placeholder="Please provide education details"></textarea>
      </div>

      <div class="section">
        <h2>Immigration Status</h2>
        <div class="grid">
          <div><label>Current Visa Type</label><input type="text" name="visa_type"></div>
          <div><label>Visa Expiry Date</label><input type="date" name="visa_expiry"></div>
          <div>
            <label>Eligible for Sponsorship</label>
            <select name="eligible_sponsorship">
              <option>Yes</option>
              <option>No</option>
            </select>
          </div>
        </div>
        <textarea name="immigration_notes" placeholder="Any additional immigration information"></textarea>
      </div>

      <div class="section">
        <h2>Care Experience</h2>
        <div class="grid">
          <div><label>Previous Care Experience</label><input type="text" name="care_experience"></div>
          <div><label>Years of Experience</label><input type="text" name="years_experience"></div>
          <div><label>Current Employer</label><input type="text" name="current_employer"></div>
        </div>
      </div>

      <div class="section">
        <h2>Compliance</h2>
        <div class="grid">
          <div><label>DBS Status</label><input type="text" name="dbs_status"></div>
          <div>
            <label>Full UK Driving Licence</label>
            <select name="uk_licence"><option>Yes</option><option>No</option></select>
          </div>
          <div>
            <label>Own Vehicle</label>
            <select name="own_vehicle"><option>Yes</option><option>No</option></select>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>Availability</h2>
        <div class="grid">
          <div>
            <label>Available for Flexible Shifts</label>
            <select name="flexible_shifts"><option>Yes</option><option>No</option></select>
          </div>
          <div><label>Available Start Date</label><input type="date" name="start_date"></div>
        </div>
      </div>

      <div class="section">
        <h2>Additional Notes</h2>
        <textarea name="additional_notes" placeholder="Any other relevant information"></textarea>
      </div>

      <button type="submit" class="submit-btn">Submit Applicant Information</button>
    </form>
  </div>
</body>
</html>
